{% extends "base.html" %}
{% block content %}
<div style="max-width:460px;margin:60px auto;padding:0 20px 60px;">
<div style="background:#fff;border-radius:20px;padding:36px;border:0.5px solid rgba(26,188,156,0.2);box-shadow:0 4px 24px rgba(11,61,46,0.08);">
    <div style="text-align:center;margin-bottom:24px;">
    <div style="width:64px;height:64px;background:#e0f7f4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <i class="fas fa-lock" style="font-size:26px;color:#1ABC9C;"></i>
            </div>
            <h4 style="font-weight:700;color:#0B3D2E;margin-bottom:6px;">Admin Login</h4>
                <p style="font-size:13px;color:#888;line-height:1.6;">Only authorised administrators can access the dashboard and analytics.</p>
                    </div>
                    <form method="POST" action="/login">
                    <div style="margin-bottom:16px;">
                    <label style="font-size:12.5px;font-weight:600;color:#0B3D2E;display:block;margin-bottom:7px;">
                        <i class="fas fa-user me-1" style="color:#1ABC9C;"></i> Username
                            </label>
                            <input type="text" name="username" style="width:100%;border:1.5px solid rgba(11,61,46,0.15);border-radius:10px;padding:11px 14px;font-size:13.5px;background:#F0F7F5;color:#0B3D2E;box-sizing:border-box;" placeholder="Enter your username" required>
                                </div>
                                <div style="margin-bottom:8px;">
                                <label style="font-size:12.5px;font-weight:600;color:#0B3D2E;display:block;margin-bottom:7px;">
                                    <i class="fas fa-key me-1" style="color:#1ABC9C;"></i> Password
                                        </label>
                                        <input type="password" name="password" style="width:100%;border:1.5px solid rgba(11,61,46,0.15);border-radius:10px;padding:11px 14px;font-size:13.5px;background:#F0F7F5;color:#0B3D2E;box-sizing:border-box;" placeholder="Enter your password" required>
                                            </div>
                                            <div style="text-align:right;margin-bottom:20px;">
                                            <a href="/forgot-password" style="font-size:12px;color:#1ABC9C;text-decoration:none;font-weight:600;">Forgot password?</a>
                                                </div>
                                                <button type="submit" style="background:#0B3D2E;color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:all 0.2s;">
                                                    <i class="fas fa-right-to-bracket me-2"></i> Login to Dashboard
                                                    </button>
                                                    </form>
                                                    <div style="display:flex;justify-content:center;gap:24px;margin-top:24px;padding-top:20px;border-top:0.5px solid rgba(26,188,156,0.15);">
                                                    <div style="text-align:center;">
                                                    <i class="fas fa-shield-halved" style="font-size:18px;color:#1ABC9C;display:block;margin-bottom:4px;"></i>
                                                        <span style="font-size:11px;color:#aaa;">HTTPS</span>
                                                            </div>
                                                            <div style="text-align:center;">
                                                            <i class="fas fa-key" style="font-size:18px;color:#1ABC9C;display:block;margin-bottom:4px;"></i>
                                                                <span style="font-size:11px;color:#aaa;">Encrypted</span>
                                                                    </div>
                                                                    <div style="text-align:center;">
                                                                    <i class="fas fa-eye-slash" style="font-size:18px;color:#1ABC9C;display:block;margin-bottom:4px;"></i>
                                                                        <span style="font-size:11px;color:#aaa;">Private</span>
                                                                            </div>
                                                                            </div>
                                                                            </div>
                                                                            </div>
                                                                            {% endblock %}
