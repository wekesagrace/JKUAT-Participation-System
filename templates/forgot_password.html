{% extends "base.html" %}
{% block content %}

<div style="max-width:480px; margin:60px auto; padding:0 20px 60px;">
    <div class="sy-card">

        <div style="text-align:center; margin-bottom:24px;">
            <div style="width:60px; height:60px; background:#e0f7f4;
                        border-radius:50%; display:flex;
                        align-items:center; justify-content:center;
                        margin:0 auto 16px;">
                <i class="fas fa-key"
                   style="font-size:24px; color:#1ABC9C;"></i>
            </div>
            <h4 style="font-weight:700; color:#0B3D2E; margin-bottom:6px;">
                Reset your password
            </h4>
            <p style="font-size:13px; color:#888; line-height:1.6;">
                Answer the security question and set a new password.
            </p>
        </div>

        <form method="POST" action="/forgot-password">

            <div style="margin-bottom:16px;">
                <label style="font-size:12.5px; font-weight:600;
                              color:#0B3D2E; display:block; margin-bottom:7px;">
                    <i class="fas fa-user me-1" style="color:#1ABC9C;"></i>
                    Admin username
                </label>
                <input type="text" name="username" class="sy-input"
                       placeholder="Enter your username" required>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:12.5px; font-weight:600;
                              color:#0B3D2E; display:block; margin-bottom:7px;">
                    <i class="fas fa-shield-halved me-1"
                       style="color:#1ABC9C;"></i>
                    Security question
                </label>
                <div style="background:#f0f7f5; border-radius:10px;
                            padding:12px 16px; font-size:13px;
                            color:#0B3D2E; font-weight:500;
                            margin-bottom:8px;">
                    What is the name of your institution?
                </div>
                <input type="text" name="secret_answer" class="sy-input"
                       placeholder="e.g. JKUAT" required>
                <div style="font-size:11px; color:#aaa; margin-top:4px;">
                    Hint: Enter JKUAT or Jomo Kenyatta
                </div>
            </div>

            <div style="margin-bottom:16px;">
                <label style="font-size:12.5px; font-weight:600;
                              color:#0B3D2E; display:block; margin-bottom:7px;">
                    <i class="fas fa-lock me-1" style="color:#1ABC9C;"></i>
                    New password
                </label>
                <input type="password" name="new_password" class="sy-input"
                       placeholder="Minimum 6 characters" required>
            </div>

            <div style="margin-bottom:24px;">
                <label style="font-size:12.5px; font-weight:600;
                              color:#0B3D2E; display:block; margin-bottom:7px;">
                    <i class="fas fa-lock me-1" style="color:#1ABC9C;"></i>
                    Confirm new password
                </label>
                <input type="password" name="confirm_password" class="sy-input"
                       placeholder="Repeat new password" required>
            </div>

            <button type="submit" class="sy-btn-primary">
                <i class="fas fa-rotate me-2"></i> Reset Password
            </button>

        </form>

        <div style="text-align:center; margin-top:20px;">
            <a href="/login"
               style="font-size:13px; color:#1ABC9C;
                      text-decoration:none; font-weight:600;">
                <i class="fas fa-arrow-left me-1"></i> Back to login
            </a>
        </div>

    </div>
</div>
{% endblock %}
